    .cin-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 28%, rgba(55,14,8,0.97) 0%, rgba(9,4,2,0.99) 70%);
      z-index: -2;
      animation: cinBgIn 0.28s ease both;
    }
    @keyframes cinBgIn { from { opacity:0; } to { opacity:1; } }
    /* Vignette ring */
    .cin-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(0,0,0,0.55) 100%);
    }
    /* Floating ember particles */
    .cin-embers {
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }
    .cin-ember {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      animation: cinEmberRise var(--dur,3s) ease-out var(--delay,0s) infinite;
    }
    @keyframes cinEmberRise {
      0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0.8; }
      60%  { opacity: 0.6; }
      100% { transform: translateY(-100%) translateX(var(--drift,20px)) scale(0.2); opacity: 0; }
    }
    /* Horizontal shimmer line */
    .cin-shimmer {
      position: absolute;
      left: 0; right: 0;

      animation: cinShimmerSlide 2.4s ease-in-out infinite;
      z-index: -1;

    @keyframes cinShimmerSlide {

    .cin-headline {

    @keyframes cinHeadlineIn {

    .cin-headline.cin-caught {

      color: var(--accent-2);
      font-size: 1.5rem;
      text-shadow: 0 0 22px rgba(242,208,143,0.55);
    }
    .cin-players {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      width: 100%;
      max-width: 520px;
    }
    .cin-player {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      position: relative;
      overflow: visible;
      min-height: calc(var(--layout-cinematic-avatar-size) + 96px);
    }
    .cin-player.challenger {
      animation: cinSlideL 0.45s cubic-bezier(0.34,1.4,0.64,1) 0.1s both;
    }
    .cin-player.challenged {
      animation: cinSlideR 0.45s cubic-bezier(0.34,1.4,0.64,1) 0.1s both;
    }
    @keyframes cinSlideL { from { transform:translateX(-40px); opacity:0; } to { transform:translateX(0); opacity:1; } }
    @keyframes cinSlideR { from { transform:translateX( 40px); opacity:0; } to { transform:translateX(0); opacity:1; } }
    .cin-role {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .cin-player-info {
      margin-top: var(--layout-cinematic-player-info-offset);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .cin-player.no-avatar .cin-player-info {
      margin-top: calc(var(--layout-cinematic-avatar-size) + var(--layout-cinematic-player-info-offset));
    }
    .cin-avatar {
      width: var(--layout-cinematic-avatar-size);
      height: var(--layout-cinematic-avatar-size);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.65rem;
      font-weight: 900;
      color: rgba(255,255,255,0.92);
      box-shadow: 0 4px 22px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,255,255,0.18);
      border: 2px solid rgba(255,255,255,0.12);
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }
    .cin-player.challenged .cin-avatar {
      transform: scaleX(-1);
    }
    .cin-avatar canvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: block;
      position: relative;
      z-index: 1;
    }
    .cin-avatar-fallback {
      position: relative;
      z-index: 1;
    }
    /* Outer ring glow */
    .cin-avatar.avatar-glow::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1.5px solid rgba(200,153,82,0.4);
      animation: cinRingPulse 1.6s ease-in-out infinite;
    }
    @keyframes cinRingPulse {
      0%,100% { transform:scale(1); opacity:0.4; }
      50%      { transform:scale(1.07); opacity:0.9; }
    }
    .cin-name {
      font-size: var(--layout-cinematic-player-info-font);
      font-weight: 700;
      text-align: center;
      color: var(--text);
    }
    .cin-arch {
      font-size: calc(var(--layout-cinematic-player-info-font) * 0.8);
      color: var(--accent);
      text-align: center;
    }
    .cin-tags {
      font-size: calc(var(--layout-cinematic-player-info-font) * 0.72);
      color: var(--muted);
      text-align: center;
      line-height: 1.4;
    }
    .cin-vs {
      font-size: 1.35rem;
      font-weight: 900;
      color: var(--accent-2);
      text-shadow: 0 0 16px rgba(242,208,143,0.55);
      align-self: center;
      flex-shrink: 0;
    }
    .cin-divider {
      width: 100%;
      max-width: 520px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,153,82,0.28), transparent);
    }
    /* Card flip layout */
    .cin-cards-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: cinCardsIn 0.4s ease 0.22s both;
    }
    @keyframes cinCardsIn {
      from { transform:translateY(14px); opacity:0; }
      to   { transform:translateY(0); opacity:1; }
    }
    .cin-cards-label {
      font-size: 0.73rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .cin-cards-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    /* 3-D card flip */
    .cin-card-wrap {
      perspective: 640px;
      width: 54px;
      height: 84px;
    }
    .cin-card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
    }
    .cin-card-wrap.flip-it .cin-card-inner {
      animation: cinFlip 0.58s cubic-bezier(0.4, 0, 0.2, 1) var(--fd, 0s) both;
    }
    @keyframes cinFlip {
      0%   { transform: rotateY(0deg); }
      100% { transform: rotateY(180deg); }
    }
    .cin-card-back, .cin-card-face {
      position: absolute;
      inset: 0;
      border-radius: 11px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .cin-card-back { overflow: hidden; }
    .cin-card-face {
      transform: rotateY(180deg);
      overflow: visible;
    }
    .cin-card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
      display: block;
    }
    .cin-card-sub {
      position: absolute;
      left: 50%;
      bottom: -7px;
      transform: translateX(-50%);
      font-size: 0.52rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      opacity: 0.95;
      z-index: 3;
      pointer-events: none;
      white-space: nowrap;
      text-shadow: 0 1px 0 rgba(0,0,0,0.7), 0 0 8px rgba(0,0,0,0.45);
    }
    .face-truth .cin-card-sub { color: var(--ok); }
    .face-lie   .cin-card-sub { color: var(--danger); }
    .face-wild  .cin-card-sub { color: var(--wild); }
    .cin-result {
      padding: 10px 26px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 700;
      text-align: center;
      animation: cinResultIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cinResultIn {
      from { transform:scale(0.75); opacity:0; }
      to   { transform:scale(1); opacity:1; }
    }
    .cin-result.res-good   { background:rgba(102,177,124,0.18); border:1px solid rgba(102,177,124,0.4); color:var(--ok); }
    .cin-result.res-warn   { background:rgba(200,90,90,0.18);   border:1px solid rgba(200,90,90,0.4);   color:var(--danger); }
    .cin-result.res-neutral{ background:rgba(200,153,82,0.12);  border:1px solid rgba(200,153,82,0.28); color:var(--accent-2); }
    .fx-burst-shell {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
    }
    /* ── Bet-action burst (Call! / Raise! / Fold!) over avatar ── */
    .cin-action-burst {
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: 20;
      pointer-events: none;
      font-size: var(--layout-cinematic-burst-font);
      font-weight: 900;
      white-space: nowrap;
      letter-spacing: 0.04em;
      animation: cinBurst var(--layout-cinematic-burst-duration) both;
    }
    .cin-action-burst.burst-call  { color: #88ccff; text-shadow: 0 0 14px rgba(100,180,255,0.9), 0 0 32px rgba(60,140,255,0.5); }
    .cin-action-burst.burst-raise { color: #f2d08f; text-shadow: 0 0 14px rgba(242,160,40,0.95), 0 0 32px rgba(200,110,10,0.6); }
    .cin-action-burst.burst-fold  { color: #ff9090; text-shadow: 0 0 14px rgba(255,70,70,0.95),  0 0 32px rgba(200,30,30,0.6); }
    .cin-action-burst.burst-liar  {
      color: #ff6f6f;
      text-shadow: 0 0 16px rgba(255,70,70,0.98), 0 0 34px rgba(220,10,10,0.7);
      font-size: var(--layout-liar-burst-font);
      animation: cinBurstLiar var(--layout-liar-burst-duration) both;
    }
    .cin-action-burst.burst-countdown {
      color: #f2c06a;
      text-shadow: 0 0 18px rgba(255,180,60,0.95), 0 0 40px rgba(200,100,0,0.6);
      font-size: 5.5rem;
    }
    @keyframes cinBurst {
      0%   { transform: translate(-50%, -50%) scale(0.3);  opacity: 1;
             animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); }
      19%  { transform: translate(-50%, -50%) scale(1.5);  opacity: 1;
             animation-timing-function: linear; }
      67%  { transform: translate(-50%, -50%) scale(1.5);  opacity: 1;
             animation-timing-function: ease-in; }
      100% { transform: translate(-50%, -105%) scale(2.28); opacity: 0; }
    }
    @keyframes cinBurstLiar {
      0%   { transform: translate(calc(-50% + var(--layout-liar-burst-offset-x, -232px)), -50%) scale(0.3); opacity: 1;
             animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); }
      20%  { transform: translate(calc(-50% + var(--layout-liar-burst-offset-x, -232px)), -50%) scale(2.2); opacity: 1;
             animation-timing-function: linear; }
      82%  { transform: translate(calc(-50% + var(--layout-liar-burst-offset-x, -232px)), -50%) scale(2.2); opacity: 1;
             animation-timing-function: ease-in; }
      100% { transform: translate(calc(-50% + var(--layout-liar-burst-offset-x, -232px)), var(--layout-liar-burst-end-y)) scale(2.95); opacity: 0; }
    }
    .cin-reveal-label {
      position: absolute;
      left: 50%;
      bottom: -14px;
      transform: translateX(-50%);
      font-size: 0.58rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent-2);
      text-shadow: 0 1px 0 rgba(0,0,0,0.7), 0 0 8px rgba(0,0,0,0.45);
      pointer-events: none;
      white-space: nowrap;
    }
    /* ── Tankanscript vertical side columns ── */
    .cin-tankan {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'TankanScript', serif;
      font-size: 7.5rem;
      line-height: 1;
      writing-mode: vertical-rl;
      pointer-events: none;
      z-index: 1;
      letter-spacing: 0.12em;
      color: rgba(255, 130, 40, 0.55);
      text-shadow:
        0 0 8px  rgba(255, 50, 0, 0.9),
        0 0 22px rgba(200, 20, 0, 0.55),
        0 0 50px rgba(140, 10, 0, 0.4);
      opacity: 0;
      animation: cinTankanIn 0.65s ease-out 0.05s forwards, tankanFlicker 2.4s ease-in-out 0.8s infinite;
    }
    .cin-tankan.left  { left:  max(8px, calc(50% - 350px)); }
    .cin-tankan.right { right: max(8px, calc(50% - 350px)); transform: translateY(-50%) scaleX(-1); }
    @keyframes cinTankanIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes tankanFlicker {
      0%, 100% {
        filter: brightness(1);
        text-shadow: 0 0 8px rgba(255,50,0,0.9), 0 0 22px rgba(200,20,0,0.55), 0 0 50px rgba(140,10,0,0.4);
      }
      38% {
        filter: brightness(1.45);
        text-shadow: 0 0 14px rgba(255,90,0,1), 0 0 34px rgba(220,40,0,0.75), 0 0 70px rgba(170,15,0,0.55);
      }
      65% { filter: brightness(0.8); }
    }
    .cin-continue {
      padding: 11px 34px;
      background: var(--accent);
      color: #1d140f;
      border-radius: 14px;
      font-weight: 800;
      font-size: 0.9rem;
      border: none;
      cursor: pointer;
      box-shadow: var(--shadow);
      animation: cinBtnIn 0.3s ease 0.3s both;
    }
    @keyframes cinBtnIn {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    /* Betting zone inside cinematic */
    #cin-betting-zone {
      width: 100%;
      max-width: 520px;
      display: grid;
      gap: 8px;
    }
    .cin-bet-header {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--accent);
      text-align: center;
    }
    .cin-bet-stake {
      font-size: 1.15rem;
      font-weight: 900;
      color: var(--accent-2);
      text-align: center;
      text-shadow: 0 0 14px rgba(242,208,143,0.4);
    }
    .cin-bet-contribs {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
    }
    .cin-bet-actions {
      display: flex;
      gap: 9px;
      margin-top: 2px;
    }
    .cin-bet-actions button {
      flex: 1 1 0;

      padding: 12px 8px;
      font-size: 0.85rem;
      font-weight: 800;
    }
    .cin-waiting {
      font-size: 0.74rem;
      color: var(--muted);
      font-style: italic;
      text-align: center;
      animation: cinWaitPulse 1.3s ease-in-out infinite;
    }
    @keyframes cinWaitPulse {
      0%,100% { opacity:0.5; }
      50%      { opacity:1; }
    }
    /* ── Chip sprites ── */
    .cin-chip-row {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-wrap: wrap;
    }
    .cin-chip-count {
      font-size: 0.82rem;
      font-weight: 800;
      color: var(--text);
      margin-left: 5px;
      white-space: nowrap;
    }
    .cin-chip-extra {
      font-size: 0.66rem;
      color: var(--muted);
      margin-left: 2px;
    }
    /* Three-column chip summary */
    .cin-chip-table {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 6px 10px;
      align-items: start;
      width: 100%;
      max-width: 520px;

    .cin-chip-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .cin-chip-col.left  { align-items: flex-start; }
    .cin-chip-col.right { align-items: flex-end; }
    .cin-chip-col-mid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .cin-chip-label {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .cin-chip-pot-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--accent);

    /* Outline all projectable elements in mapping mode */
    body.proj-mapping [data-proj-id] {

      cursor: crosshair !important;
      user-select: none !important;

      outline: 2px solid #c89952 !important;
      background: rgba(200,153,82,0.09) !important;

    /* Freeze game interaction while mapping */
    body.proj-mapping button:not(#projMapBtn):not(#projVarBtn):not(#projExportBtn):not(#projSubBtn):not(#projLayerPreviewBtn):not(#projVarCopyBtn):not(#projVarCloseBtn),
    body.proj-mapping select,
    body.proj-mapping input:not(.projVarInput),

    /* ── Candlelight overlay canvases ─────────────────────────────────────── */

       rules ensure mix-blend-mode is applied even before paint. */
    #candleShadowCanvas,
    #candleDarknessCanvas,
    #candleGlowCanvas {
      position: absolute !important;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      pointer-events: none !important;
      z-index: 2 !important;
      border-radius: inherit;
    }
    #candleShadowCanvas   { mix-blend-mode: multiply; }
    #candleDarknessCanvas { mix-blend-mode: multiply; }
    #candleGlowCanvas     { mix-blend-mode: screen; }

    /* ── Fullscreen mode ──────────────────────────────────────────────────────
       Fullscreen targets document.documentElement so body-fixed overlays
       (uiLayerManagerHost, chip/card fly elements) remain inside the fullscreen
       context.  The existing #app letterbox CSS handles scaling; we just ensure
       the background outside #app is pure black and dev buttons are hidden. */
    :fullscreen body,
    :-webkit-full-screen body,
    :-moz-full-screen body {
      background: black !important;
    }
    :fullscreen body::before,
    :-webkit-full-screen body::before,
    :-moz-full-screen body::before {
      opacity: 0 !important;
    }
    :fullscreen #projMapBtn,
    :fullscreen #projVarBtn,
    :fullscreen #projSubBtn,
    :fullscreen #projExportBtn,
    :fullscreen #projMapTip,
    :fullscreen #editorStatus,
    :-webkit-full-screen #projMapBtn,
    :-webkit-full-screen #projVarBtn,
    :-webkit-full-screen #projSubBtn,
    :-webkit-full-screen #projExportBtn,
    :-webkit-full-screen #projMapTip,
    :-webkit-full-screen #editorStatus {
      display: none !important;
    }
  </style>
</head>
<body>
  <!-- Lobby overlay — shown before and between games -->
  <div id="sb-lobby" style="display:none;"></div>
  <!-- Hot-seat cover — shown when passing device between human players -->
  <div id="sb-cover" style="display:none;"></div>
  <div id="authoredRoot">
    <div id="app">
    </div>
    <div id="authoredOverlay"></div>
  </div>
  <!-- UI projection mapping mode -->
  <button id="projMapBtn" title="Inspect panel projection IDs">Map</button>
  <button id="projVarBtn" title="Edit CSS vars for last selected projection element">Vars</button>
  <button id="projSubBtn" title="Toggle sub-layer mode: manipulate elements nested inside major boxes">Sub</button>
  <button id="projExportBtn" title="Copy authored layout config">Export</button>
  <div id="projMapTip"></div>
  <div id="editorStatus" aria-live="polite">Editor idle.</div>
  <div id="projVarPanel" aria-live="polite">
    <div class="projVarPanelHead">
      <div id="projVarPanelTitle">Projection Vars</div>
      <div class="projVarPanelActions">
        <button id="projVarCopyBtn" class="projVarActionBtn">Copy</button>
        <button id="projVarCloseBtn" class="projVarActionBtn">Close</button>
      </div>
    </div>
    <div id="projVarPanelBody">
      <div class="projVarHint">Select an outlined element in map mode, then open Vars.</div>
    </div>
  </div>
  <!-- Debug log panel -->
  <button id="_dbgBtn" title="Toggle debug log" hidden aria-hidden="true">Log</button>
  <div id="_dbgPanel" hidden aria-hidden="true">
    <div id="_dbgPanelHead">
      <span>DEBUG LOG</span>
      <button id="_dbgCopyBtn">Copy</button>
    </div>
    <div id="_dbgBody"></div>
  </div>
  <!-- Account, lobby, shop, and online network — loaded before the game module -->
  <script src="docs/js/scratchbones-account.js"></script>
  <script src="docs/js/scratchbones-network.js"></script>
  <script src="docs/js/scratchbones-lobby.js"></script>
  <!-- Mobile landscape fullscreen prompt (touch devices only) -->
  <script src="docs/js/scratchbones-fullscreen.js"></script>
  <script type="module" src="./main/docs/scratchbones/bootstrap.js"></script>

  <!-- ── Candlelight overlay ─────────────────────────────────────────────────
       Three canvas layers inside #app that survive innerHTML replacements via a
       MutationObserver.  They blend directly with cards, coins, and the tabletop
       PNG without touching game logic.

       Shadow canvas  (multiply) – card/coin PNGs cast shaped shadows from their
                                   actual <img> elements; height 36 for cards, 11
                                   for coins.
       Darkness canvas (multiply) – warm-amber-to-black radial vignette; gives
                                    white card/coin surfaces depth.
       Glow canvas    (screen)   – animated amber ellipse + specular streaks on
                                   dark surfaces.

       Positions and rendering settings come from the exported tablelight2.json:
         light  x: 61 px  →  61 / 1920  ≈ 3.2 % of #app width
                y: 360 px →  360 / 1080  = 33.3 % of #app height
         intensity  : 0.77   radius (ref) : 1200 px @ 1080 px height
         speed      : 4.17   turbulence   : 1.0
  ──────────────────────────────────────────────────────────────────────────── -->
</body>
</html>
