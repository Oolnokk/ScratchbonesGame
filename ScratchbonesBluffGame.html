    // first paint rather than showing white while the ES module bootstrap defers.
    (function () {
      try {
        var vars = window.SCRATCHBONES_CONFIG && window.SCRATCHBONES_CONFIG.game && window.SCRATCHBONES_CONFIG.game.cssRootVars;

          var s = document.documentElement.style;
          var keys = Object.keys(vars);
          for (var i = 0; i < keys.length; i++) {
            var k = keys[i];
            if (k.indexOf('--') === 0 && vars[k] != null) s.setProperty(k, String(vars[k]));

        }
      } catch (e) {}
    })();

        opacity: 1;
      }
      22% {
        transform: translate(-50%, -50%) scale(1.1);
        opacity: 1;

        transform: translate(calc(-50% + (var(--emoji-drift-dir, -1) * var(--emoji-kiss-drift-mid))), var(--emoji-kiss-rise-mid)) scale(1.5);
        opacity: 0.95;

      100% {
        transform: translate(calc(-50% + (var(--emoji-drift-dir, -1) * var(--emoji-kiss-drift-end))), var(--emoji-kiss-rise-end)) scale(2.1);

        animation-timing-function: cubic-bezier(0.4, 0, 0.5, 1);
      }
      26% {
        transform: translate(calc(-50% + calc(var(--emoji-drift-dir) * 60px)), calc(-50% - 28px)) rotate(12deg) scale(1.2);
        opacity: 1;
        animation-timing-function: cubic-bezier(0.55, 0, 1, 1);
      }
      100% {
        transform: translate(calc(-50% + calc(var(--emoji-drift-dir) * 85px)), 900px) rotate(260deg);

      }
    }
    @keyframes emojiBurstUp {
      0% {
        transform: translate(-50%, -50%) scale(0.05);
        opacity: 0;
        animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      18% {
        transform: translate(-50%, -50%) scale(2.1);
        opacity: 1;
        animation-timing-function: linear;
      }
      58% {
        transform: translate(-50%, -50%) scale(2.1);
        opacity: 1;
        animation-timing-function: ease-in;

      100% {
        transform: translate(-50%, -180%) scale(2.9);

    @keyframes emojiStinkTrail {

        transform: translate(-50%, -50%) scale(0.72);

       data-trick-glow attribute set by bootstrap.js on face-up trick bone cards. */
    @keyframes trickBoneFlameGlow {
      0%, 100% { filter: drop-shadow(0 0 5px rgba(39,206,140,0.80)) drop-shadow(0 0 10px rgba(67,180,140,0.50)); }

      52%      { filter: drop-shadow(0 0 22px rgba(67,180,140,1.00)) drop-shadow(0 0 34px rgba(39,206,140,0.70)) drop-shadow(0 0 10px rgba(140,255,220,0.50)); }
      72%      { filter: drop-shadow(0 0 10px rgba(39,206,140,0.85)) drop-shadow(0 0 18px rgba(67,180,140,0.55)); }
      88%      { filter: drop-shadow(0 0 20px rgba(140,255,220,0.95)) drop-shadow(0 0 30px rgba(67,206,162,0.60)) drop-shadow(0 0 7px rgba(255,255,255,0.30)); }

    @keyframes cinRingPulse {

    .cin-name {

      color: var(--text);

      text-align: center;
    }
    .cin-tags {

      text-align: center;
      line-height: 1.4;

    .cin-vs {
      font-size: 1.35rem;
      font-weight: 900;
      color: var(--accent-2);
      text-shadow: 0 0 16px rgba(242,208,143,0.55);
      align-self: center;
      flex-shrink: 0;

    .cin-divider {
      width: 100%;

      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,153,82,0.28), transparent);

    /* Card flip layout */
    .cin-cards-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: cinCardsIn 0.4s ease 0.22s both;
    }
    @keyframes cinCardsIn {
      from { transform:translateY(14px); opacity:0; }
      to   { transform:translateY(0); opacity:1; }
    }
    .cin-cards-label {
      font-size: 0.73rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .cin-cards-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    /* 3-D card flip */
    .cin-card-wrap {
      perspective: 640px;
      width: 54px;
      height: 84px;
    }
    .cin-card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
    }
    .cin-card-wrap.flip-it .cin-card-inner {
      animation: cinFlip 0.58s cubic-bezier(0.4, 0, 0.2, 1) var(--fd, 0s) both;
    }
    @keyframes cinFlip {
      0%   { transform: rotateY(0deg); }
      100% { transform: rotateY(180deg); }
    }
    .cin-card-back, .cin-card-face {
      position: absolute;
      inset: 0;
      border-radius: 11px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .cin-card-back { overflow: hidden; }
    .cin-card-face {
      transform: rotateY(180deg);
      overflow: visible;
    }
    .cin-card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
      display: block;
    }
    .cin-card-sub {
      position: absolute;
      left: 50%;
      bottom: -7px;
      transform: translateX(-50%);
      font-size: 0.52rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      opacity: 0.95;
      z-index: 3;
      pointer-events: none;
      white-space: nowrap;
      text-shadow: 0 1px 0 rgba(0,0,0,0.7), 0 0 8px rgba(0,0,0,0.45);
    }
    .face-truth .cin-card-sub { color: var(--ok); }
    .face-lie   .cin-card-sub { color: var(--danger); }
    .face-wild  .cin-card-sub { color: var(--wild); }
    .cin-result {
      padding: 10px 26px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 700;
      text-align: center;
      animation: cinResultIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cinResultIn {
      from { transform:scale(0.75); opacity:0; }
      to   { transform:scale(1); opacity:1; }
    }
    .cin-result.res-good   { background:rgba(102,177,124,0.18); border:1px solid rgba(102,177,124,0.4); color:var(--ok); }
    .cin-result.res-warn   { background:rgba(200,90,90,0.18);   border:1px solid rgba(200,90,90,0.4);   color:var(--danger); }
    .cin-result.res-neutral{ background:rgba(200,153,82,0.12);  border:1px solid rgba(200,153,82,0.28); color:var(--accent-2); }
    .fx-burst-shell {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
    }
    /* ── Bet-action burst (Call! / Raise! / Fold!) over avatar ── */
    .cin-action-burst {
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: 20;
      pointer-events: none;
      font-size: var(--layout-cinematic-burst-font);
      font-weight: 900;
      white-space: nowrap;
      letter-spacing: 0.04em;
      animation: cinBurst var(--layout-cinematic-burst-duration) both;
    }
    .cin-action-burst.burst-call  { color: #66e89a; text-shadow: 0 0 14px rgba(80,220,120,0.95),  0 0 32px rgba(20,180,70,0.65); }
    .cin-action-burst.burst-raise { color: #e84040; text-shadow: 0 0 14px rgba(240,50,50,0.98),   0 0 34px rgba(200,20,20,0.7); }
    .cin-action-burst.burst-fold  { color: #ff9090; text-shadow: 0 0 14px rgba(255,70,70,0.95),   0 0 32px rgba(200,30,30,0.6); }
    .cin-action-burst.burst-bet   { color: #f2a040; text-shadow: 0 0 14px rgba(255,140,30,0.98),  0 0 34px rgba(210,90,0,0.65); }
    .cin-action-burst.burst-win   { color: #7cf0a0; text-shadow: 0 0 14px rgba(80,230,120,0.95), 0 0 34px rgba(20,190,70,0.6); }
    .cin-action-burst.burst-out   { color: #ff7040; text-shadow: 0 0 14px rgba(255,80,30,0.98),  0 0 34px rgba(200,40,0,0.7); }
    .cin-action-burst.burst-ante  { color: #ffd97a; text-shadow: 0 0 14px rgba(255,190,60,0.95), 0 0 34px rgba(200,120,0,0.6); }
    .cin-action-burst.burst-liar  {
      color: #ff6f6f;
      text-shadow: 0 0 16px rgba(255,70,70,0.98), 0 0 34px rgba(220,10,10,0.7);
      font-size: var(--layout-liar-burst-font);
      animation: cinBurstLiar var(--layout-liar-burst-duration) both;
    }
    .cin-action-burst.burst-countdown {
      color: #f2c06a;
      text-shadow: 0 0 18px rgba(255,180,60,0.95), 0 0 40px rgba(200,100,0,0.6);
      font-size: 5.5rem;
    }
    @keyframes cinBurst {
      0%   { transform: translate(-50%, -50%) scale(0.3);  opacity: 1;
             animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); }
      19%  { transform: translate(-50%, -50%) scale(1.5);  opacity: 1;
             animation-timing-function: linear; }
      67%  { transform: translate(-50%, -50%) scale(1.5);  opacity: 1;
             animation-timing-function: ease-in; }
      100% { transform: translate(-50%, -105%) scale(2.28); opacity: 0; }
    }
    @keyframes cinBurstLiar {
      0%   { transform: translate(calc(-50% + var(--layout-liar-burst-offset-x, -232px)), -50%) scale(0.3); opacity: 1;
             animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); }
      20%  { transform: translate(calc(-50% + var(--layout-liar-burst-offset-x, -232px)), -50%) scale(2.2); opacity: 1;
             animation-timing-function: linear; }
      82%  { transform: translate(calc(-50% + var(--layout-liar-burst-offset-x, -232px)), -50%) scale(2.2); opacity: 1;
             animation-timing-function: ease-in; }
      100% { transform: translate(calc(-50% + var(--layout-liar-burst-offset-x, -232px)), var(--layout-liar-burst-end-y)) scale(2.95); opacity: 0; }
    }
    .cin-reveal-label {
      position: absolute;
      left: 50%;
      bottom: -14px;
      transform: translateX(-50%);
      font-size: 0.58rem;
      font-weight: 800;
      letter-spacing: 0.06em;

      text-shadow: 0 1px 0 rgba(0,0,0,0.7), 0 0 8px rgba(0,0,0,0.45);

    /* ── Tankanscript burst pillars ── */
    .cin-tankan-pillar {

      flex-direction: column;
      align-items: center;
      font-family: 'TankanScript', serif;
      font-size: 3.5rem;

    .cin-tankan-pillar .tankan-char { display: block; text-align: center; line-height: 0.82; margin-bottom: -0.25em; }
    .cin-tankan-pillar.burst-call  { color: #66e89a; text-shadow: 0 0 14px rgba(80,220,120,0.95), 0 0 32px rgba(20,180,70,0.65); }
    .cin-tankan-pillar.burst-raise { color: #e84040; text-shadow: 0 0 14px rgba(240,50,50,0.98),  0 0 34px rgba(200,20,20,0.7); }
    .cin-tankan-pillar.burst-bet   { color: #f2a040; text-shadow: 0 0 14px rgba(255,140,30,0.98), 0 0 34px rgba(210,90,0,0.65); }
    .cin-tankan-pillar.burst-fold  { color: #ff9090; text-shadow: 0 0 14px rgba(255,70,70,0.95),  0 0 32px rgba(200,30,30,0.6); }
    @keyframes tankanPillarBurst {
      0%   { transform: translate(-50%, -50%) scale(0.3);  opacity: 0;
             animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); }
      19%  { transform: translate(-50%, -50%) scale(1.0);  opacity: 1;
             animation-timing-function: linear; }
      67%  { transform: translate(-50%, -50%) scale(1.0);  opacity: 1;
             animation-timing-function: ease-in; }
      100% { transform: translate(-50%, -130%) scale(1.4); opacity: 0; }

    #projVarPanel {

    }

      gap: 6px;
      align-items: center;
      border: 1px solid rgba(200,150,80,0.12);

    }

    }

      padding: 4px 6px;

      font-family: inherit;
    }
    /* Outline all projectable elements in mapping mode */
    body.proj-mapping [data-proj-id] {
      outline: 2px dashed rgba(200,153,82,0.55) !important;
      outline-offset: 1px;
      cursor: crosshair !important;
      user-select: none !important;
    }
    body.proj-mapping [data-proj-id]:hover {
      outline: 2px solid #c89952 !important;
      background: rgba(200,153,82,0.09) !important;
    }
    /* Freeze game interaction while mapping */
    body.proj-mapping button:not(#projMapBtn):not(#projVarBtn):not(#projExportBtn):not(#projSubBtn):not(#projLayerPreviewBtn):not(#projVarCopyBtn):not(#projVarCloseBtn):not(#cosmeticVarsBtn):not(#cosmeticVarsCloseBtn):not(#cosmeticVarsApplyBtn),
    body.proj-mapping select,
    body.proj-mapping input:not(.projVarInput):not(.cvpFieldInput),
    body.proj-mapping .card {
      pointer-events: none !important;
    }
    /* ── Candlelight overlay canvases ─────────────────────────────────────── */
    /* Injected into #app via JS; inline styles set position/z-index but these
       rules ensure mix-blend-mode is applied even before paint. */
    #candleShadowCanvas,
    #candleDarknessCanvas,
    #candleGlowCanvas {
      position: absolute !important;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      pointer-events: none !important;
      z-index: 2 !important;
      opacity: 0.5;
      border-radius: inherit;
    }
    #candleShadowCanvas   { mix-blend-mode: multiply; }
    #candleDarknessCanvas { mix-blend-mode: multiply; }
    #candleGlowCanvas     { mix-blend-mode: screen; }
    #app.challenge-visuals-active .claimCluster { z-index: 3; }
    /* The reactor avatar is cloned into a layer-manager portal (keepOriginal:true).
       Hide the burst in the portal copy — only the original inside .claimCluster shows it. */
    .ui-layer-portal .fx-burst-shell { display: none !important; }

    /* ── Initial loading screen ─────────────────────────────── */

      display: flex; flex-direction: column; align-items: center; gap: 28px;
    }

      align-items: center;
      gap: 12px;
      background: rgba(10, 30, 26, 0.96);
      border: 2px solid #43b48c;
      border-radius: 16px;
      color: #d0fff2;
      padding: 28px 44px;
      font-size: 1.1rem;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      box-shadow: 0 0 32px rgba(67,180,140,0.45), 0 0 8px rgba(67,180,140,0.3);
      transition: box-shadow 0.15s;
    }
    #sb-fs-accept:active {
      box-shadow: 0 0 52px rgba(67,180,140,0.8);
    }
    .sb-fs-icon {
      font-size: 2.2rem;
      line-height: 1;
    }
    .sb-fs-text {
      font-size: 0.95rem;
    }
    #sb-fs-dismiss {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      color: rgba(255,255,255,0.6);
      width: 36px;
      height: 36px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
    }
    /* ── Fullscreen mode ──────────────────────────────────────────────────────
       Fullscreen targets document.documentElement so body-fixed overlays
       (uiLayerManagerHost, chip/card fly elements) remain inside the fullscreen
       context.  The existing #app letterbox CSS handles scaling; we just ensure
       the background outside #app is pure black and dev buttons are hidden. */
    :fullscreen body,
    :-webkit-full-screen body,
    :-moz-full-screen body {
      background: black !important;
    }
    :fullscreen body::before,
    :-webkit-full-screen body::before,
    :-moz-full-screen body::before {
      opacity: 0 !important;
    }
    :fullscreen #projMapBtn,
    :fullscreen #projVarBtn,
    :fullscreen #projSubBtn,
    :fullscreen #projExportBtn,
    :fullscreen #projMapTip,
    :fullscreen #editorStatus,
    :fullscreen #cosmeticVarsBtn,
    :fullscreen #cosmeticVarsPanel,
    :-webkit-full-screen #projMapBtn,
    :-webkit-full-screen #projVarBtn,
    :-webkit-full-screen #projSubBtn,
    :-webkit-full-screen #projExportBtn,
    :-webkit-full-screen #projMapTip,
    :-webkit-full-screen #editorStatus,
    :-webkit-full-screen #cosmeticVarsBtn,
    :-webkit-full-screen #cosmeticVarsPanel {
      display: none !important;
    }
    /* ── Cosmetic Xform Vars button & panel ─────────────────── */
    #cosmeticVarsBtn {
      position: fixed;
      bottom: calc(10px + var(--safe)); right: 116px;
      z-index: 1000;
      background: rgba(30,20,18,0.92);
      border: 1px solid rgba(200,150,80,0.4);
      color: #c89952; font-size: 0.72rem;
      padding: 6px 11px; border-radius: 8px;
      cursor: pointer; letter-spacing: 0.05em;
      display: none;
    }
    #cosmeticVarsBtn:hover { background: rgba(67,49,43,0.97); }
    #cosmeticVarsBtn.active { background: #c89952; color: #15110f; }
    #cosmeticVarsBtn.active:hover { background: #e0ad60; }
    #cosmeticVarsPanel {
      position: fixed;
      bottom: calc(50px + var(--safe));
      right: 10px;
      width: min(480px, calc(100vw - 20px));
      max-height: min(80vh, 760px);
      background: rgba(14,10,9,0.97);
      border: 1px solid rgba(200,150,80,0.4);
      border-radius: 10px;
      z-index: 9999;
      display: none;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }
    #cosmeticVarsPanel.open { display: flex; }
    .cvpHead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid rgba(200,150,80,0.15);
      background: rgba(30,20,18,0.92);
      flex-shrink: 0;
    }
    .cvpTitle { font-size: 0.75rem; letter-spacing: 0.06em; color: #f2d08f; }
    .cvpCloseBtn {
      font-size: 0.68rem; padding: 3px 8px;
      background: rgba(67,49,43,0.9);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text); border-radius: 5px; cursor: pointer;
    }
    .cvpCloseBtn:hover { background: rgba(90,66,55,0.95); }
    .cvpBody {
      overflow-y: auto;
      padding: 8px 10px 12px;
      font-family: 'Courier New', monospace;
      font-size: 0.70rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .cvpPreset { border: 1px solid rgba(200,150,80,0.2); border-radius: 7px; padding: 8px; }
    .cvpPresetLabel {
      font-size: 0.72rem; color: #f2d08f; margin-bottom: 6px; letter-spacing: 0.04em;
    }
    .cvpPresetLabel em { color: #c8bfaf; font-style: normal; }
    .cvpFields {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
    }
    .cvpField { display: flex; flex-direction: column; gap: 2px; }
    .cvpField label { color: #cdbb9f; font-size: 0.64rem; }
    .cvpFieldInput {
      width: 100%; min-width: 0;
      background: rgba(26,18,15,0.95);
      border: 1px solid rgba(200,150,80,0.35);
      border-radius: 5px;
      color: #f4e8d0;
      padding: 3px 5px;
      font-size: 0.66rem;
      font-family: inherit;
    }
    .cvpApplyBtn {
      align-self: flex-end;
      margin-top: 4px;
      font-size: 0.72rem; padding: 5px 14px;
      background: #c89952; color: #15110f;
      border: none; border-radius: 6px; cursor: pointer;
      letter-spacing: 0.06em;
    }
    .cvpApplyBtn:hover { background: #e0ad60; }

    /* ── Tutorial overlay ─────────────────────────────────────────────────────
       #sb-tutorial-overlay wraps:
         .tut-backdrop  — full-screen semi-transparent mask that blocks all game
                          pointer-events while the tutorial is active.
         .tut-ring      — position:fixed amber-glow ring repositioned via JS to
                          surround whichever element is being explained.  Uses the
                          same pulsing box-shadow rhythm as the trick-bone glow.
         .tut-panel     — explanation card anchored to the bottom (or top) of the
                          viewport; contains heading, body text, and nav buttons.
    ──────────────────────────────────────────────────────────────────────────── */
    #sb-tutorial-overlay {
      position: fixed;
      inset: 0;
      z-index: 9998;
      pointer-events: none;
      display: none;
    }
    .tut-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.62);
      pointer-events: all;
    }
    /* Amber fire-glow ring — mirrors the verdigris palette of trickBoneFlameGlow
       but shifted to warm gold so it reads as "tutorial spotlight" rather than
       trick-bone magic. */
    .tut-ring {
      position: fixed;
      border-radius: 10px;
      pointer-events: none;
      z-index: 9999;
      animation: tutRingPulse 1.9s ease-in-out infinite;
    }
    @keyframes tutRingPulse {
      0%, 100% {
        box-shadow:
          0 0 0 3px rgba(242, 208, 143, 0.90),
          0 0 16px 5px rgba(242, 160, 40, 0.55);
      }
      20% {
        box-shadow:
          0 0 0 5px rgba(255, 230, 170, 1.00),
          0 0 30px 12px rgba(255, 180, 50, 0.80),
          0 0 8px 3px rgba(255, 255, 200, 0.40);
      }
      50% {
        box-shadow:
          0 0 0 4px rgba(255, 210, 100, 1.00),
          0 0 24px 9px rgba(230, 140, 30, 0.70);
      }
      75% {
        box-shadow:
          0 0 0 5px rgba(255, 225, 150, 0.95),
          0 0 28px 11px rgba(255, 160, 40, 0.75),
          0 0 7px 2px rgba(255, 255, 180, 0.30);
      }
    }
    .tut-panel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: min(540px, calc(100vw - 28px));
      background: rgba(20, 12, 8, 0.97);
      border: 1px solid rgba(242, 208, 143, 0.38);
      border-radius: 14px;
      padding: 18px 22px 15px;
      display: flex;
      flex-direction: column;
      gap: 11px;
      pointer-events: all;
      z-index: 10000;
      box-shadow: 0 6px 40px rgba(0, 0, 0, 0.70);
    }
    .tut-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }
    .tut-title {
      font-family: 'KhymeryyanRomanLetters+Numbers', Inter, system-ui, sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #f2d08f;
      letter-spacing: 0.06em;
    }
    .tut-counter {
      font-size: 0.74rem;
      color: rgba(255, 255, 255, 0.42);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tut-text {
      font-size: 0.875rem;
      line-height: 1.58;
      color: rgba(255, 255, 255, 0.87);
      white-space: pre-line;
    }
    .tut-nav {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .tut-btn {
      font: inherit;
      font-size: 0.82rem;
      padding: 7px 15px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.80);
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 120ms ease;
    }
    .tut-btn:hover { background: rgba(255, 255, 255, 0.17); }
    .tut-btn:disabled { opacity: 0.32; cursor: not-allowed; }
    .tut-btn-next {
      background: rgba(242, 160, 50, 0.18);
      border-color: rgba(242, 208, 143, 0.55);
      color: #f2d08f;
    }
    .tut-btn-next:hover { background: rgba(242, 160, 50, 0.32); }
    .tut-btn-skip {
      margin-right: auto;
      font-size: 0.76rem;
      opacity: 0.58;
    }
    .tut-btn-skip:hover { opacity: 1; }
  </style>
</head>
<body>
  <!-- Initial loading screen — visible from first paint, removed once bootstrap is ready -->
  <div id="sb-loading">
    <div class="sb-loading-inner">
      <div class="sb-loading-title">SCRATCHBONES!</div>
      <img class="sb-loading-card" src="./docs/assets/hud/2DScratchBoneFlipped.png" alt="" aria-hidden="true">
      <div class="sb-loading-progress">
        <div class="sb-loading-bar-track"><div class="sb-loading-bar-fill" id="sb-loading-bar"></div></div>
        <div class="sb-loading-count" id="sb-loading-count">Loading&hellip;</div>
      </div>
    </div>
  </div>
  <script>
    (function () {
      function dismissLoadingScreen() {
        var el = document.getElementById('sb-loading');
        if (!el || el.dataset.dismissed) return;
        el.dataset.dismissed = '1';
        el.classList.add('sb-loading-fade');
        el.addEventListener('transitionend', function () { el.remove(); }, { once: true });
      }
      window.addEventListener('scratchbones:assets-loaded', dismissLoadingScreen, { once: true });
      window.addEventListener('scratchbones:load-progress', function (e) {
        var bar = document.getElementById('sb-loading-bar');
        var count = document.getElementById('sb-loading-count');
        if (!bar || !count) return;
        var loaded = e.detail.loaded || 0;
        var total = e.detail.total || 1;
        bar.style.width = Math.round((loaded / total) * 100) + '%';
        count.textContent = loaded + ' / ' + total + ' assets';
      });
    })();
  </script>
  <!-- Lobby overlay — shown before and between games -->
  <div id="sb-lobby" style="display:none;"></div>
  <!-- Hot-seat cover — shown when passing device between human players -->
  <div id="sb-cover" style="display:none;"></div>
  <div id="authoredRoot">
    <div id="app">
      <!-- Tutorial overlay — managed by tutorial.js, built lazily on first show() -->
      <div id="sb-tutorial-overlay" style="display:none;"></div>
    </div>
    <div id="authoredOverlay"></div>
  </div>
  <!-- UI projection mapping mode -->
  <button id="projMapBtn" title="Inspect panel projection IDs">Map</button>
  <button id="projVarBtn" title="Edit CSS vars for last selected projection element">Vars</button>
  <button id="projSubBtn" title="Toggle sub-layer mode: manipulate elements nested inside major boxes">Sub</button>
  <button id="projExportBtn" title="Copy authored layout config">Export</button>
  <div id="projMapTip"></div>
  <div id="editorStatus" aria-live="polite">Editor idle.</div>
  <div id="projVarPanel" aria-live="polite">
    <div class="projVarPanelHead">
      <div id="projVarPanelTitle">Projection Vars</div>
      <div class="projVarPanelActions">
        <button id="projVarCopyBtn" class="projVarActionBtn">Copy</button>
        <button id="projVarCloseBtn" class="projVarActionBtn">Close</button>
      </div>
    </div>
    <div id="projVarPanelBody">
      <div class="projVarHint">Select an outlined element in map mode, then open Vars.</div>
    </div>
  </div>
  <!-- Cosmetic Xform Vars button & panel (shown in lobby instead of Map button) -->
  <button id="cosmeticVarsBtn" title="Edit portrait xform presets">Cosmetic Vars</button>
  <div id="cosmeticVarsPanel" aria-live="polite">
    <div class="cvpHead">
      <span class="cvpTitle">Portrait Xform Presets</span>
      <button class="cvpCloseBtn" id="cosmeticVarsCloseBtn">Close</button>
    </div>
    <div class="cvpBody" id="cosmeticVarsBody">
      <div class="cvpPreset" data-preset="A">
        <div class="cvpPresetLabel">Preset A &mdash; <em>heads, ur-heads, eyes</em></div>
        <div class="cvpFields">
          <div class="cvpField"><label>ax</label><input class="cvpFieldInput" id="cvp-A-ax" type="number" step="0.001" value="-0.2"></div>
          <div class="cvpField"><label>ay</label><input class="cvpFieldInput" id="cvp-A-ay" type="number" step="0.001" value="0"></div>
          <div class="cvpField"><label>scaleX</label><input class="cvpFieldInput" id="cvp-A-scaleX" type="number" step="0.01" value="2.55"></div>
          <div class="cvpField"><label>scaleY</label><input class="cvpFieldInput" id="cvp-A-scaleY" type="number" step="0.01" value="2.55"></div>
          <div class="cvpField"><label>rotDeg</label><input class="cvpFieldInput" id="cvp-A-rotDeg" type="number" step="0.1" value="0"></div>
        </div>
      </div>
      <div class="cvpPreset" data-preset="B">
        <div class="cvpPresetLabel">Preset B &mdash; <em>body layers, cosmetics</em></div>
        <div class="cvpFields">
          <div class="cvpField"><label>ax</label><input class="cvpFieldInput" id="cvp-B-ax" type="number" step="0.001" value="-0.0983"></div>
          <div class="cvpField"><label>ay</label><input class="cvpFieldInput" id="cvp-B-ay" type="number" step="0.001" value="-0.0809"></div>
          <div class="cvpField"><label>scaleX</label><input class="cvpFieldInput" id="cvp-B-scaleX" type="number" step="0.01" value="2.49"></div>
          <div class="cvpField"><label>scaleY</label><input class="cvpFieldInput" id="cvp-B-scaleY" type="number" step="0.01" value="2.49"></div>
          <div class="cvpField"><label>rotDeg</label><input class="cvpFieldInput" id="cvp-B-rotDeg" type="number" step="0.1" value="0"></div>
        </div>
      </div>
      <div class="cvpPreset" data-preset="C">
        <div class="cvpPresetLabel">Preset C &mdash; <em>reserved</em></div>
        <div class="cvpFields">
          <div class="cvpField"><label>ax</label><input class="cvpFieldInput" id="cvp-C-ax" type="number" step="0.001" value="0"></div>
          <div class="cvpField"><label>ay</label><input class="cvpFieldInput" id="cvp-C-ay" type="number" step="0.001" value="0"></div>
          <div class="cvpField"><label>scaleX</label><input class="cvpFieldInput" id="cvp-C-scaleX" type="number" step="0.01" value="1"></div>
          <div class="cvpField"><label>scaleY</label><input class="cvpFieldInput" id="cvp-C-scaleY" type="number" step="0.01" value="1"></div>
          <div class="cvpField"><label>rotDeg</label><input class="cvpFieldInput" id="cvp-C-rotDeg" type="number" step="0.1" value="0"></div>
        </div>
      </div>
      <div class="cvpPreset" data-preset="D">
        <div class="cvpPresetLabel">Preset D &mdash; <em>reserved</em></div>
        <div class="cvpFields">
          <div class="cvpField"><label>ax</label><input class="cvpFieldInput" id="cvp-D-ax" type="number" step="0.001" value="0"></div>
          <div class="cvpField"><label>ay</label><input class="cvpFieldInput" id="cvp-D-ay" type="number" step="0.001" value="0"></div>
          <div class="cvpField"><label>scaleX</label><input class="cvpFieldInput" id="cvp-D-scaleX" type="number" step="0.01" value="1"></div>
          <div class="cvpField"><label>scaleY</label><input class="cvpFieldInput" id="cvp-D-scaleY" type="number" step="0.01" value="1"></div>
          <div class="cvpField"><label>rotDeg</label><input class="cvpFieldInput" id="cvp-D-rotDeg" type="number" step="0.1" value="0"></div>
        </div>
      </div>
      <button class="cvpApplyBtn" id="cosmeticVarsApplyBtn">Apply</button>
    </div>
  </div>
  <!-- Debug log panel -->
  <button id="_dbgBtn" title="Toggle debug log" hidden aria-hidden="true">Log</button>
  <div id="_dbgPanel" hidden aria-hidden="true">
    <div id="_dbgPanelHead">
      <span>DEBUG LOG</span>
      <div id="_dbgFilters" aria-label="Log level filters">
        <label class="_dbgFlt"><input type="checkbox" data-flt="debug" checked> dbg</label>
        <label class="_dbgFlt"><input type="checkbox" data-flt="log" checked> log</label>
        <label class="_dbgFlt"><input type="checkbox" data-flt="warn" checked> warn</label>
        <label class="_dbgFlt"><input type="checkbox" data-flt="error" checked> err</label>
      </div>
      <button id="_dbgCopyBtn">Copy</button>
    </div>
    <div id="_dbgBody"></div>
  </div>
  <!-- Account, lobby, shop, and online network — loaded before the game module -->
  <script src="docs/js/scratchbones-account.js"></script>
  <script src="docs/js/scratchbones-network.js"></script>
  <script src="docs/js/scratchbones-lobby.js"></script>
  <!-- Mobile landscape fullscreen prompt (touch devices only) -->
  <script src="docs/js/scratchbones-fullscreen.js"></script>
  <script type="module" src="./main/docs/scratchbones/bootstrap.js"></script>

  <!-- ── Candlelight overlay ─────────────────────────────────────────────────
       Three canvas layers inside #app that survive innerHTML replacements via a
       MutationObserver.  They blend directly with cards, coins, and the tabletop
       PNG without touching game logic.

       Shadow canvas  (multiply) – card/coin PNGs cast shaped shadows from their
                                   actual <img> elements; height 36 for cards, 11
                                   for coins.
       Darkness canvas (multiply) – warm-amber-to-black radial vignette; gives
                                    white card/coin surfaces depth.
       Glow canvas    (screen)   – animated amber ellipse + specular streaks on
                                   dark surfaces.

       Positions and rendering settings come from the exported tablelight2.json:
         light  x: 61 px  →  61 / 1920  ≈ 3.2 % of #app width
                y: 360 px →  360 / 1080  = 33.3 % of #app height
         intensity  : 0.77   radius (ref) : 1200 px @ 1080 px height
         speed      : 4.17   turbulence   : 1.0
  ──────────────────────────────────────────────────────────────────────────── -->
</body>
</html>
